services:
  - type: web
    name: finpilot-api
    env: node
    plan: free
    region: oregon
    buildCommand: |
      corepack enable pnpm
      pnpm install --frozen-lockfile
      pnpm --filter @finpilot/api prisma generate
      pnpm --filter @finpilot/api prisma migrate deploy
      pnpm --filter @finpilot/api build
    startCommand: pnpm --filter @finpilot/api start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health

  - type: web
    name: finpilot-web
    env: static
    buildCommand: |
      corepack enable pnpm
      echo "VITE_API_URL=${VITE_API_URL}" > apps/web/.env.production
      pnpm install --frozen-lockfile
      pnpm --filter @finpilot/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        value: https://finpilot-api.onrender.com/api
