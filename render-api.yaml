services:
  - type: web
    name: finpilot-api
    env: node
    plan: free
    region: oregon
    buildCommand: |
      pnpm install --frozen-lockfile --prod=false
      pnpm --filter @finpilot/api prisma generate
      pnpm --filter @finpilot/api prisma migrate deploy
      pnpm --filter @finpilot/api prisma db seed
      pnpm --filter @finpilot/api build
    startCommand: pnpm --filter @finpilot/api start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health
